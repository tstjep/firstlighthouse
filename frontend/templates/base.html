<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}salesintel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --brand:        #1a3a6b;
      --brand-light:  #e8edf5;
      --brand-mid:    #2d5fa6;
      --accent:       #3b7de8;
      --success:      #1a7a3e;
      --success-bg:   #e8f5ee;
      --danger:       #b91c1c;
      --danger-bg:    #fef2f2;
      --warning-bg:   #fffbeb;

      --radius:       10px;
      --radius-sm:    6px;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow:       0 4px 12px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
      --shadow-hover: 0 8px 24px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);

      /* Pico overrides */
      --pico-primary:             var(--accent);
      --pico-primary-background:  var(--brand-light);
      --pico-font-family:         'Inter', system-ui, sans-serif;
      --pico-border-radius:       var(--radius-sm);
    }

    * { box-sizing: border-box; }

    body {
      background: #f4f6fa;
      color: #1c2333;
      max-width: 100%;
    }

    /* ── Sidebar layout ──────────────────────────────────────────────── */
    .app-shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--brand);
      color: #c8d8f0;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1.25rem;
      text-decoration: none;
    }

    .sidebar-logo .mark {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }

    .sidebar-logo .wordmark {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .sidebar-section {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b8abf;
      padding: 0 0.75rem;
      margin: 0.75rem 0 0.25rem;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      color: #c8d8f0;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar a:hover { background: rgba(255,255,255,.1); color: #fff; }
    .sidebar a.active { background: rgba(255,255,255,.15); color: #fff; }

    /* ── Main content ────────────────────────────────────────────────── */
    .main-area {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .page-header {
      background: #fff;
      border-bottom: 1px solid #e5e9f0;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .page-header h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: -0.3px;
    }

    .page-header .subtitle {
      font-size: 0.82rem;
      color: #6b7a99;
      margin: 0.15rem 0 0;
    }

    .page-content {
      padding: 2rem;
      flex: 1;
      max-width: 900px;
    }

    .page-content.wide { max-width: 100%; }

    /* ── Flash ───────────────────────────────────────────────────────── */
    .flash {
      padding: 0.8rem 1.1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .flash.success { background: var(--success-bg); color: var(--success); border: 1px solid #a7d8be; }
    .flash.error   { background: var(--danger-bg);  color: var(--danger);  border: 1px solid #fca5a5; }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .campaign-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .campaign-card {
      background: #fff;
      border: 1px solid #e5e9f0;
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s, transform 0.15s;
    }

    .campaign-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }

    .campaign-card h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--brand);
    }

    .campaign-card .meta {
      font-size: 0.78rem;
      color: #8896b0;
      margin: 0;
    }

    .campaign-card .excerpt {
      font-size: 0.82rem;
      color: #5a6680;
      margin: 0;
      line-height: 1.45;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .campaign-card .actions {
      display: flex;
      gap: 0.5rem;
      margin-top: auto;
      padding-top: 0.9rem;
      border-top: 1px solid #f0f2f7;
    }

    .campaign-card .actions a,
    .campaign-card .actions button {
      margin: 0;
      padding: 0.38rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
    }

    .new-card {
      background: #fff;
      border: 2px dashed #c8d0e0;
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
      cursor: pointer;
      text-decoration: none;
      color: #8896b0;
      font-size: 0.9rem;
      font-weight: 600;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .new-card:hover { border-color: var(--accent); color: var(--accent); background: var(--brand-light); }

    /* ── Badge / tag ─────────────────────────────────────────────────── */
    .tag {
      display: inline-block;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .tag.positive { background: #dcfce7; color: #166534; }
    .tag.negative { background: #fee2e2; color: #991b1b; }
    .tag.neutral  { background: #f1f5fb; color: #64748b; }

    /* ── Editor layout ───────────────────────────────────────────────── */
    .section {
      background: #fff;
      border: 1px solid #e5e9f0;
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow-sm);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #f0f2f7;
    }

    .section-header h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--brand);
    }

    /* ── Signal / segment cards ─────────────────────────────────────── */
    .signal-card, .segment-card {
      border: 1px solid #e5e9f0;
      border-radius: var(--radius-sm);
      padding: 1.1rem;
      margin-bottom: 0.85rem;
      background: #fafbfd;
    }

    .signal-card.positive { border-left: 4px solid #22c55e; }
    .signal-card.negative { border-left: 4px solid #ef4444; }
    .segment-card         { border-left: 4px solid var(--accent); }

    .signal-card .card-header,
    .segment-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
    }

    .signal-card .card-header h4,
    .segment-card .card-header h4 {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--brand);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* ── Form helpers ────────────────────────────────────────────────── */
    .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    label { font-size: 0.85rem; font-weight: 600; color: #374151; }
    input, select, textarea { font-size: 0.875rem !important; }

    .help {
      font-size: 0.78rem;
      color: #8896b0;
      margin-top: 0.25rem;
      margin-bottom: 0.75rem;
      display: block;
      line-height: 1.4;
    }

    textarea { font-family: inherit; }
    textarea[style*="monospace"] { font-family: monospace !important; font-size: 0.82rem !important; }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn-sm { padding: 0.35rem 0.75rem !important; font-size: 0.8rem !important; font-weight: 600; }

    .btn-ghost {
      background: none;
      border: 1px solid #d1d9e6;
      color: #374151;
      border-radius: var(--radius-sm);
    }
    .btn-ghost:hover { background: #f4f6fa; border-color: #b0bdd0; }

    .btn-danger {
      background: none !important;
      border-color: #fca5a5 !important;
      color: #b91c1c !important;
    }
    .btn-danger:hover { background: #fef2f2 !important; border-color: #ef4444 !important; }

    /* ── Sticky footer ───────────────────────────────────────────────── */
    .sticky-footer {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #e5e9f0;
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      box-shadow: 0 -4px 12px rgba(0,0,0,.06);
      z-index: 10;
    }

    details summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 0.875rem;
      color: #5a6680;
    }

    details[open] summary { color: var(--brand); }

    small, .muted { color: #8896b0; font-size: 0.78rem; }

    code {
      background: #f1f5fb;
      padding: 0.1em 0.4em;
      border-radius: 4px;
      font-size: 0.82em;
      color: var(--brand);
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: static; flex-direction: row; flex-wrap: wrap; }
      .page-content { padding: 1rem; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <a href="/" class="sidebar-logo">
      <!-- Funky logo mark: overlapping geometric shapes -->
      <svg class="mark" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="34" height="34" rx="9" fill="#3b7de8"/>
        <!-- bar chart bars -->
        <rect x="5"  y="20" width="5" height="9"  rx="1.5" fill="rgba(255,255,255,0.5)"/>
        <rect x="12" y="13" width="5" height="16" rx="1.5" fill="rgba(255,255,255,0.75)"/>
        <rect x="19" y="8"  width="5" height="21" rx="1.5" fill="#fff"/>
        <!-- upward arrow / spark -->
        <path d="M27 5 L30 5 L30 8" stroke="#a5f3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 10 L30 5" stroke="#a5f3fc" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="wordmark">salesintel</span>
    </a>

    <span class="sidebar-section">Workspace</span>
    <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Campaigns
    </a>

    {% block sidebar_extra %}{% endblock %}
  </nav>

  <!-- ── Main ── -->
  <div class="main-area">
    <div class="page-header">
      <div>
        <h1>{% block page_title %}salesintel{% endblock %}</h1>
        {% block page_subtitle %}{% endblock %}
      </div>
      <div style="display:flex; gap: 0.5rem; align-items: center;">
        {% block page_actions %}{% endblock %}
      </div>
    </div>

    {% if flash %}
      <div style="padding: 0 2rem; margin-top: 1rem;">
        <div class="flash {{ flash.type }}">{{ flash.message }}</div>
      </div>
    {% endif %}

    <div class="page-content {% block content_class %}{% endblock %}">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>
</body>
</html>
